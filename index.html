<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>RexRush — Endless Runner</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hud">
      <div class="hud-row top">
        <div class="panel score">
          <span class="label">SCORE</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="panel hi">
          <span class="label">BEST</span>
          <span id="hi" class="value">0</span>
        </div>
        <div class="panel eggs">
          <span class="label">EGGS</span>
          <span id="eggs" class="value">0</span>
        </div>
      </div>
      <div class="hud-row bottom">
        <div id="combo" class="combo hidden">COMBO ×<span id="comboVal">1</span></div>
      </div>
    </div>

    <!-- Start screen -->
    <div id="startScreen" class="overlay">
      <div class="title">
        <span class="glitch" data-text="REX RUSH">REX RUSH</span>
        <div class="subtitle">Endless Runner · Three.js Edition</div>
      </div>
      <div class="controls">
        <div class="ctrl"><kbd>←</kbd><kbd>→</kbd><span>Change lane</span></div>
        <div class="ctrl"><kbd>↑</kbd>/<kbd>Space</kbd><span>Jump</span></div>
        <div class="ctrl"><kbd>↓</kbd>/<kbd>Shift</kbd><span>Slide</span></div>
        <div class="ctrl"><kbd>P</kbd><span>Pause</span></div>
      </div>
      <button id="startBtn" class="cta">TAP / PRESS SPACE TO START</button>
    </div>

    <!-- Game over -->
    <div id="gameOver" class="overlay hidden">
      <div class="title"><span class="glitch" data-text="GAME OVER">GAME OVER</span></div>
      <div class="stats">
        <div>Score <b id="finalScore">0</b></div>
        <div>Eggs  <b id="finalEggs">0</b></div>
        <div>Best  <b id="finalHi">0</b></div>
      </div>
      <button id="retryBtn" class="cta">RETRY</button>
    </div>

    <!-- Pause -->
    <div id="pauseScreen" class="overlay hidden">
      <div class="title"><span class="glitch" data-text="PAUSED">PAUSED</span></div>
      <button id="resumeBtn" class="cta">RESUME</button>
    </div>

    <!-- Mobile touch zones -->
    <div id="touch" class="touch">
      <div class="tz tz-left"  data-action="left"></div>
      <div class="tz tz-right" data-action="right"></div>
      <div class="tz tz-up"    data-action="jump"></div>
      <div class="tz tz-down"  data-action="slide"></div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
